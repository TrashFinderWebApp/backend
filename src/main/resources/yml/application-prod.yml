spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tfinder
    username: root
    password: 1234


  #Oauth2
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 96e68892441ef62e7409a448a940d0da
            redirect_url: http://localhost:8080/oauth2/callback/kakao
            scope: account_email,profile_nickname
